<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teatro - Ensayos Musicales</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11100f;
      --panel: #1b1917;
      --panel-2: #24201d;
      --line: #3a332d;
      --text: #fff8ee;
      --muted: #c9b9a7;
      --accent: #d6a84f;
      --accent-2: #8fc7c0;
      --danger: #e06c5f;
      --shadow: 0 18px 60px rgba(0, 0, 0, .32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .55), rgba(0, 0, 0, .08) 18%, rgba(0, 0, 0, .08) 82%, rgba(0, 0, 0, .55)),
        radial-gradient(circle at 50% 0%, rgba(214, 168, 79, .20), transparent 38%),
        repeating-linear-gradient(90deg, #190f10 0 42px, #241315 42px 84px);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      background:
        linear-gradient(180deg, rgba(17, 16, 15, .15), rgba(17, 16, 15, .94) 58%, var(--bg)),
        linear-gradient(90deg, rgba(0, 0, 0, .18), transparent 28%, transparent 72%, rgba(0, 0, 0, .18));
    }

    .sidebar {
      min-height: 100vh;
      padding: 26px 18px;
      border-right: 1px solid rgba(255, 248, 238, .12);
      background: rgba(18, 16, 15, .78);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(214, 168, 79, .45);
      background: linear-gradient(145deg, rgba(214, 168, 79, .28), rgba(143, 199, 192, .10));
      border-radius: 8px;
      box-shadow: inset 0 0 26px rgba(214, 168, 79, .08);
    }

    .brand-mark svg {
      width: 25px;
      height: 25px;
      stroke: var(--accent);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .playlist-list {
      display: grid;
      gap: 9px;
    }

    .playlist-button {
      width: 100%;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px;
      color: var(--text);
      text-align: left;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
    }

    .playlist-button:hover,
    .playlist-button.active {
      background: rgba(255, 248, 238, .07);
      border-color: rgba(255, 248, 238, .12);
    }

    .playlist-button.active {
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .cover {
      width: 48px;
      aspect-ratio: 1;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #1b1917;
      font-weight: 800;
      background:
        linear-gradient(145deg, var(--cover-a), var(--cover-b)),
        linear-gradient(45deg, rgba(255, 255, 255, .18), transparent);
    }

    .playlist-name {
      display: block;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .playlist-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      min-width: 0;
      padding: 28px clamp(18px, 4vw, 46px);
    }

    .stage {
      min-height: calc(100vh - 56px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      padding: clamp(18px, 3vw, 34px);
      border: 1px solid rgba(255, 248, 238, .12);
      border-radius: 8px;
      background:
        linear-gradient(115deg, rgba(27, 25, 23, .94), rgba(27, 25, 23, .70)),
        radial-gradient(circle at 85% 20%, var(--hero-glow), transparent 42%);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 8px;
      background: linear-gradient(90deg, var(--cover-a), var(--cover-b));
      opacity: .9;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--accent-2);
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .hero h2 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(32px, 5vw, 66px);
      line-height: .96;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 680px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .big-count {
      width: 116px;
      height: 116px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(255, 248, 238, .16);
      background: rgba(255, 248, 238, .06);
      color: var(--accent);
      font-size: 42px;
      font-weight: 850;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(300px, 440px);
      gap: 18px;
      min-height: 0;
    }

    .song-list,
    .mixer {
      border: 1px solid rgba(255, 248, 238, .12);
      border-radius: 8px;
      background: rgba(27, 25, 23, .88);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255, 248, 238, .10);
    }

    .section-head h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .pill {
      min-width: 52px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(143, 199, 192, .12);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 750;
    }

    .songs {
      padding: 8px;
      display: grid;
      gap: 5px;
      max-height: 46vh;
      overflow: auto;
    }

    .song {
      width: 100%;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 8px 10px;
      color: var(--text);
      text-align: left;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
    }

    .song:hover,
    .song.active {
      background: rgba(255, 248, 238, .07);
      border-color: rgba(255, 248, 238, .12);
    }

    .song-number {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 248, 238, .08);
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
    }

    .song.active .song-number {
      background: var(--accent);
      color: #1b1917;
    }

    .song-title {
      display: block;
      font-weight: 780;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .song-role {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .duration {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .mixer {
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }

    .now {
      padding: 18px 18px 0;
    }

    .now h3 {
      margin: 0;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .now p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .transport {
      display: grid;
      grid-template-columns: 48px 48px 48px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 18px;
    }

    .icon-button {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 248, 238, .08);
      border: 1px solid rgba(255, 248, 238, .12);
    }

    .icon-button.primary {
      background: var(--accent);
      color: #181512;
      border-color: transparent;
    }

    .icon-button.active {
      background: rgba(143, 199, 192, .22);
      color: var(--accent-2);
      border-color: rgba(143, 199, 192, .48);
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      stroke: currentColor;
    }

    .timebar {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .progress {
      width: 100%;
      accent-color: var(--accent);
    }

    .times {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .faders {
      display: grid;
      gap: 12px;
      padding: 0 18px 18px;
      align-content: start;
    }

    .fader {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) 48px;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 248, 238, .06);
      border: 1px solid rgba(255, 248, 238, .10);
    }

    .track-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--accent-2);
    }

    .track-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
    }

    .fader label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 760;
    }

    .volume {
      width: 100%;
      accent-color: var(--accent-2);
    }

    .value {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .status {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .lyrics {
      margin: 0 18px 18px;
      border: 1px solid rgba(255, 248, 238, .10);
      border-radius: 8px;
      background: rgba(255, 248, 238, .05);
      overflow: hidden;
    }

    .lyrics[hidden] {
      display: none;
    }

    .lyrics h4 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 248, 238, .10);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0;
    }

    .lyrics pre {
      max-height: 220px;
      margin: 0;
      padding: 14px;
      overflow: auto;
      color: var(--text);
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.55;
    }

    .status strong {
      color: var(--accent);
    }

    .hidden-audio {
      display: none;
    }

    @media (max-width: 880px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 248, 238, .12);
        padding: 18px;
      }

      .playlist-list {
        grid-auto-flow: column;
        grid-auto-columns: minmax(230px, 1fr);
        overflow-x: auto;
        padding-bottom: 4px;
      }

      main {
        padding: 18px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .big-count {
        display: none;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .songs {
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      .brand {
        margin-bottom: 16px;
      }

      .playlist-list {
        grid-auto-columns: minmax(210px, 86vw);
      }

      .transport {
        grid-template-columns: 48px 48px 48px;
      }

      .timebar {
        grid-column: 1 / -1;
      }

      .fader {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .value {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" aria-label="Teatro Ensayos Musicales">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5h16"></path>
            <path d="M6 5v11a6 6 0 0 0 12 0V5"></path>
            <path d="M8 10h.01"></path>
            <path d="M16 10h.01"></path>
            <path d="M9 15c2 1.5 4 1.5 6 0"></path>
          </svg>
        </div>
        <div>
          <h1>Teatro</h1>
          <p>Ensayos musicales</p>
        </div>
      </div>
      <nav class="playlist-list" id="playlistList" aria-label="Obras"></nav>
    </aside>

    <main>
      <section class="stage">
        <header class="hero" id="hero">
          <div>
            <p class="kicker" id="heroKicker">Obra seleccionada</p>
            <h2 id="playlistTitle">Cargando</h2>
            <p id="playlistDescription"></p>
          </div>
          <div class="big-count" id="songCount">0</div>
        </header>

        <div class="content">
          <section class="song-list" aria-labelledby="songsTitle">
            <div class="section-head">
              <h3 id="songsTitle">Canciones</h3>
              <span class="pill" id="songTotal">0 pistas</span>
            </div>
            <div class="songs" id="songList"></div>
          </section>

          <section class="mixer" aria-label="Mezclador">
            <div class="now">
              <h3 id="currentTitle">Seleccioná una canción</h3>
              <p id="currentMeta">Voz principal y coros separados</p>
            </div>

            <div class="transport">
              <button class="icon-button primary" id="playButton" type="button" aria-label="Reproducir o pausar" title="Reproducir o pausar">
                <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 5v14l11-7z"></path>
                </svg>
              </button>
              <button class="icon-button" id="stopButton" type="button" aria-label="Detener" title="Detener">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 7h10v10H7z"></path>
                </svg>
              </button>
              <button class="icon-button" id="loopButton" type="button" aria-label="Activar loop" title="Activar loop">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="m17 2 4 4-4 4"></path>
                  <path d="M3 11V9a3 3 0 0 1 3-3h15"></path>
                  <path d="m7 22-4-4 4-4"></path>
                  <path d="M21 13v2a3 3 0 0 1-3 3H3"></path>
                </svg>
              </button>
              <div class="timebar">
                <input class="progress" id="progress" type="range" min="0" max="1000" value="0" aria-label="Progreso">
                <div class="times">
                  <span id="currentTime">0:00</span>
                  <span id="duration">0:00</span>
                </div>
              </div>
            </div>

            <div class="faders">
              <div class="fader" id="leadFader">
                <div class="track-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                    <path d="M12 18v4"></path>
                  </svg>
                </div>
                <div>
                  <label for="leadVolume" id="leadLabel">Voz principal</label>
                  <input class="volume" id="leadVolume" type="range" min="0" max="1" step="0.01" value="1">
                </div>
                <span class="value" id="leadValue">100%</span>
              </div>

              <div class="fader" id="choirFader">
                <div class="track-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21v-2a4 4 0 0 1 8 0v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M4 21v-2a4 4 0 0 1 3-3.87"></path>
                  </svg>
                </div>
                <div>
                  <label for="choirVolume" id="choirLabel">Coros</label>
                  <input class="volume" id="choirVolume" type="range" min="0" max="1" step="0.01" value="0.85">
                </div>
                <span class="value" id="choirValue">85%</span>
              </div>
            </div>

            <div class="lyrics" id="lyricsPanel" hidden>
              <h4 id="lyricsTitle">Letra</h4>
              <pre id="lyricsText"></pre>
            </div>

            <div class="status" id="status"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <audio id="leadAudio" class="hidden-audio" preload="metadata"></audio>
  <audio id="choirAudio" class="hidden-audio" preload="metadata"></audio>

  <script src="library.js"></script>
  <script>
    let playlists = [
      {
        id: "romeo-julieta",
        title: "Romeo y Julieta",
        company: "Compañía joven",
        description: "Material de ensayo para escenas musicales, dúos y ensambles.",
        colors: ["#d6a84f", "#8fc7c0"],
        songs: [
          {
            title: "Prólogo de Verona",
            role: "Ensamble completo",
            duration: "3:12",
            lead: "audio/romeo-julieta/prologo-voz.mp3",
            choir: "audio/romeo-julieta/prologo-coros.mp3"
          },
          {
            title: "Balcón",
            role: "Dúo principal",
            duration: "4:05",
            lead: "audio/romeo-julieta/balcon-voz.mp3",
            choir: "audio/romeo-julieta/balcon-coros.mp3"
          },
          {
            title: "Fiesta en Capuleto",
            role: "Coro y cuerpo de baile",
            duration: "2:58",
            lead: "audio/romeo-julieta/fiesta-voz.mp3",
            choir: "audio/romeo-julieta/fiesta-coros.mp3"
          }
        ]
      },
      {
        id: "suenio-verano",
        title: "Sueño de una Noche de Verano",
        company: "Elenco principal",
        description: "Canciones para bosque, hadas, artesanos y escenas de transición.",
        colors: ["#9ac46b", "#cf8fd9"],
        songs: [
          {
            title: "Entrada al Bosque",
            role: "Coro de hadas",
            duration: "3:34",
            lead: "audio/suenio-verano/entrada-bosque-voz.mp3",
            choir: "audio/suenio-verano/entrada-bosque-coros.mp3"
          },
          {
            title: "Canción de Puck",
            role: "Solista",
            duration: "2:41",
            lead: "audio/suenio-verano/puck-voz.mp3",
            choir: "audio/suenio-verano/puck-coros.mp3"
          },
          {
            title: "Final de los Enamorados",
            role: "Ensamble",
            duration: "4:22",
            lead: "audio/suenio-verano/final-voz.mp3",
            choir: "audio/suenio-verano/final-coros.mp3"
          }
        ]
      },
      {
        id: "hamlet",
        title: "Hamlet",
        company: "Versión musical",
        description: "Pistas de estudio para solistas, coro interno y escenas del palacio.",
        colors: ["#d66c57", "#6ea4d6"],
        songs: [
          {
            title: "Sombras de Elsinor",
            role: "Coro interno",
            duration: "3:47",
            lead: "audio/hamlet/sombras-voz.mp3",
            choir: "audio/hamlet/sombras-coros.mp3"
          },
          {
            title: "Ser o No Ser",
            role: "Solo Hamlet",
            duration: "4:18",
            lead: "audio/hamlet/ser-o-no-ser-voz.mp3",
            choir: "audio/hamlet/ser-o-no-ser-coros.mp3"
          },
          {
            title: "Telón del Reino",
            role: "Final coral",
            duration: "3:55",
            lead: "audio/hamlet/telon-reino-voz.mp3",
            choir: "audio/hamlet/telon-reino-coros.mp3"
          }
        ]
      }
    ];

    const audioBase = "Audio/Matilda, El Musical De Roahl Dahl/";

    function cleanTitle(fileName) {
      return fileName
        .replace(/\.(mp3|wav)$/i, "")
        .replace(/^\d+_/, "")
        .replace(/\s+\((Instrumental|Coros)\)$/i, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function single(fileName) {
      return {
        title: cleanTitle(fileName),
        role: "Pista unica",
        tracks: [
          { label: "Pista", src: audioBase + fileName, volume: 1 }
        ]
      };
    }

    function split(title, instrumentalFile, choirFile) {
      return {
        title,
        role: "Instrumental y coros",
        tracks: [
          { label: "Instrumental", src: audioBase + instrumentalFile, volume: 1 },
          { label: "Coros", src: audioBase + choirFile, volume: 0.85 }
        ]
      };
    }

    playlists = [
      {
        id: "matilda",
        title: "Matilda, El Musical De Roahl Dahl",
        company: "Primera obra",
        description: "Pistas de ensayo cargadas desde la carpeta Audio. Las canciones con coros separados muestran dos controles; el resto se reproduce como una sola pista.",
        colors: ["#d6a84f", "#8fc7c0"],
        songs: [
          single("01_Milagro (Canción).mp3"),
          single("02_Intro Traviesos.mp3"),
          single("03_Traviesos (Canción).mp3"),
          single("04_Pelo Verde.mp3"),
          single("05_Te Cuento Una Historia.mp3"),
          single("06_Historia de la Acróbata I (Part 1).mp3"),
          single("07_Historia de la Acróbata I (Part 2).mp3"),
          split("Canción de la Escuela", "08_Canción de la Escuela (Instrumental).mp3", "08_Canción de la Escuela (Coros).wav"),
          single("09_Los Libros de Matillda - Intro Patético .mp3"),
          single("10_El Martillo (Canción).mp3"),
          single("11_El Martillo A Los Wormwoods.mp3"),
          single("12_Traviesos - Pegamento (Part 1).mp3"),
          single("13_Traviesos - Pegamento (Part 2) (Canción).mp3"),
          single("14_Traviesos - Pegamento (Part 3).mp3"),
          single("15_La Canción Del Agujero (Canción).mp3"),
          single("16_Escondiendo A Nigel (Canción Del Agujero).mp3"),
          single("17_Amanda Thripp (Colitas) .mp3"),
          single("18_Mecánicos (Part 1).mp3"),
          single("19_Mecánicos (Part 2).mp3"),
          single("20_This Little Girl.mp3"),
          single("21_Historia de la Acróbata II (Part 1).mp3"),
          single("22_Historia de la Acróbata II (Part 2).mp3"),
          single("23_De la Biblioteca al Aula Intro.mp3"),
          single("24_La Entrada de Tronchatoro.mp3"),
          single("25_Secuencia del Eructo (Part 1).mp3"),
          single("26_Secuencia del Eructo (Part 2).mp3"),
          single("27_Secuencia del Eructo (Part 3).mp3"),
          single("28_Bruce (Canción) (Part 1).mp3"),
          single("29_Bruce (Canción) (Part 2).mp3"),
          single("30_Bruce (Canción) (Playoff).mp3"),
          single("31_Transición a Sé Que Al Crecer.mp3"),
          split("Sé Que Al Crecer", "32_Sé Que Al Crecer (Instrumental).mp3", "32_Sé Que Al Crecer (Coros).wav"),
          single("33_Historia de la Acróbata III (Part 1).mp3"),
          single("34_Historia de la Acróbata III (Part 2).mp3"),
          single("35_Historia de la Acróbata III (Part 3).mp3"),
          single("36_A La Casa de los Wormwood.mp3"),
          single("37_Ratón de Biblioteca.mp3"),
          single("38_Historia de la Acróbata IV .mp3"),
          single("39_Qué Estás Haciendo Con Esos Libros .mp3"),
          single("40_El Olor de la Rebelión (Canción).mp3"),
          single("41_Renacuajo I.mp3"),
          single("42_Renacuajo II.mp3"),
          single("43_Silencio (Canción).mp3"),
          single("44_1st vaso.mp3"),
          single("45_Renacuajo III.mp3"),
          single("46_2nd Vaso.mp3"),
          single("47_De Camino a la Casa de la Señorita Miel.mp3"),
          single("48_La Revelación de Tronchatoro (Part 1).mp3"),
          single("49_La Revelación de Tronchatoro (Part 2).mp3"),
          single("50_El Gato de Nigel.mp3"),
          single("51_Lever.mp3"),
          single("52_La Escritura de Tiza.mp3"),
          single("53_Revoltosos (Canción).mp3"),
          single("54_Unos Días Después.mp3"),
          single("55_Nos Vamos a España.mp3"),
          single("56_Se Encontraron Mutuamente (Final).mp3"),
          single("57_Saludos (Canción).mp3"),
          single("58_Música de Sala.mp3")
        ]
      }
    ];

    if (Array.isArray(window.TEATRO_LIBRARY) && window.TEATRO_LIBRARY.length) {
      playlists = window.TEATRO_LIBRARY;
    }

    const state = {
      playlistIndex: 0,
      songIndex: 0,
      playing: false,
      loop: false,
      fallbackTimer: null,
      fallbackCurrent: 0,
      fallbackDuration: 180,
      usingFallback: false
    };

    const els = {
      playlistList: document.querySelector("#playlistList"),
      songList: document.querySelector("#songList"),
      hero: document.querySelector("#hero"),
      heroKicker: document.querySelector("#heroKicker"),
      playlistTitle: document.querySelector("#playlistTitle"),
      playlistDescription: document.querySelector("#playlistDescription"),
      songCount: document.querySelector("#songCount"),
      songTotal: document.querySelector("#songTotal"),
      currentTitle: document.querySelector("#currentTitle"),
      currentMeta: document.querySelector("#currentMeta"),
      playButton: document.querySelector("#playButton"),
      playIcon: document.querySelector("#playIcon"),
      stopButton: document.querySelector("#stopButton"),
      loopButton: document.querySelector("#loopButton"),
      progress: document.querySelector("#progress"),
      currentTime: document.querySelector("#currentTime"),
      duration: document.querySelector("#duration"),
      leadAudio: document.querySelector("#leadAudio"),
      choirAudio: document.querySelector("#choirAudio"),
      leadFader: document.querySelector("#leadFader"),
      choirFader: document.querySelector("#choirFader"),
      leadLabel: document.querySelector("#leadLabel"),
      choirLabel: document.querySelector("#choirLabel"),
      leadVolume: document.querySelector("#leadVolume"),
      choirVolume: document.querySelector("#choirVolume"),
      leadValue: document.querySelector("#leadValue"),
      choirValue: document.querySelector("#choirValue"),
      lyricsPanel: document.querySelector("#lyricsPanel"),
      lyricsTitle: document.querySelector("#lyricsTitle"),
      lyricsText: document.querySelector("#lyricsText"),
      status: document.querySelector("#status")
    };

    function formatTime(seconds) {
      const safe = Number.isFinite(seconds) ? Math.max(0, seconds) : 0;
      const mins = Math.floor(safe / 60);
      const secs = Math.floor(safe % 60).toString().padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function parseDuration(value) {
      if (!value || !value.includes(":")) return 180;
      const [mins, secs] = value.split(":").map(Number);
      return mins * 60 + secs;
    }

    function trackAudios() {
      return [els.leadAudio, els.choirAudio];
    }

    function activeAudios() {
      return trackAudios().slice(0, currentSong().tracks.length);
    }

    function readableTrackList(song) {
      return song.tracks.map((track) => track.label).join(" + ");
    }

    function currentPlaylist() {
      return playlists[state.playlistIndex];
    }

    function currentSong() {
      return currentPlaylist().songs[state.songIndex];
    }

    function setTheme(playlist) {
      const [a, b] = playlist.colors;
      document.documentElement.style.setProperty("--cover-a", a);
      document.documentElement.style.setProperty("--cover-b", b);
      document.documentElement.style.setProperty("--hero-glow", `${a}44`);
    }

    function renderPlaylists() {
      els.playlistList.innerHTML = "";
      playlists.forEach((playlist, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `playlist-button${index === state.playlistIndex ? " active" : ""}`;
        button.innerHTML = `
          <span class="cover" style="--cover-a: ${playlist.colors[0]}; --cover-b: ${playlist.colors[1]};">${playlist.title.slice(0, 1)}</span>
          <span>
            <span class="playlist-name">${playlist.title}</span>
            <span class="playlist-meta">${playlist.songs.length} canciones</span>
          </span>
        `;
        button.addEventListener("click", () => selectPlaylist(index));
        els.playlistList.appendChild(button);
      });
    }

    function renderSongs() {
      const playlist = currentPlaylist();
      els.songList.innerHTML = "";
      playlist.songs.forEach((song, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `song${index === state.songIndex ? " active" : ""}`;
        button.innerHTML = `
          <span class="song-number">${String(index + 1).padStart(2, "0")}</span>
          <span>
            <span class="song-title">${song.title}</span>
            <span class="song-role">${song.role}</span>
          </span>
          <span class="duration">${song.duration || "--:--"}</span>
        `;
        button.addEventListener("click", () => selectSong(index));
        els.songList.appendChild(button);
      });
    }

    function updateHeader() {
      const playlist = currentPlaylist();
      setTheme(playlist);
      els.heroKicker.textContent = playlist.company;
      els.playlistTitle.textContent = playlist.title;
      els.playlistDescription.textContent = playlist.description;
      els.songCount.textContent = playlist.songs.length;
      els.songTotal.textContent = `${playlist.songs.length} pistas`;
    }

    function updateNowPlaying() {
      const song = currentSong();
      els.currentTitle.textContent = song.title;
      els.currentMeta.textContent = `${song.role} - ${readableTrackList(song)}`;
      els.duration.textContent = song.duration || "--:--";
      state.fallbackDuration = parseDuration(song.duration);
      updateProgress(0, state.fallbackDuration);
    }

    function setPlayIcon() {
      els.playIcon.innerHTML = state.playing
        ? '<path d="M7 5h4v14H7z"></path><path d="M13 5h4v14h-4z"></path>'
        : '<path d="M8 5v14l11-7z"></path>';
    }

    function syncLoopButton() {
      els.loopButton.classList.toggle("active", state.loop);
      els.loopButton.setAttribute("aria-label", state.loop ? "Desactivar loop" : "Activar loop");
      els.loopButton.title = state.loop ? "Desactivar loop" : "Activar loop";
    }

    function syncVolumes() {
      els.leadAudio.volume = Number(els.leadVolume.value);
      els.choirAudio.volume = Number(els.choirVolume.value);
      els.leadValue.textContent = `${Math.round(els.leadVolume.value * 100)}%`;
      els.choirValue.textContent = `${Math.round(els.choirVolume.value * 100)}%`;
    }

    function syncFaders() {
      const [firstTrack, secondTrack] = currentSong().tracks;
      els.leadLabel.textContent = firstTrack.label;
      els.leadVolume.value = firstTrack.volume ?? 1;
      els.leadFader.style.display = "";

      if (secondTrack) {
        els.choirLabel.textContent = secondTrack.label;
        els.choirVolume.value = secondTrack.volume ?? 0.85;
        els.choirFader.style.display = "";
      } else {
        els.choirFader.style.display = "none";
        els.choirVolume.value = 0;
      }

      syncVolumes();
    }

    function syncLyrics() {
      const song = currentSong();
      if (!song.lyrics) {
        els.lyricsPanel.hidden = true;
        els.lyricsText.textContent = "";
        return;
      }

      els.lyricsTitle.textContent = `Letra - ${song.title}`;
      els.lyricsText.textContent = song.lyrics;
      els.lyricsPanel.hidden = false;
      els.lyricsText.scrollTop = 0;
    }

    function setStatus(message, isFallback = false) {
      els.status.innerHTML = isFallback ? `<strong>Demo</strong> ${message}` : message;
    }

    function loadSong() {
      const song = currentSong();
      stopPlayback();
      trackAudios().forEach((audio, index) => {
        const track = song.tracks[index];
        audio.removeAttribute("src");
        audio.load();
        if (track) {
          audio.src = track.src;
          audio.load();
        }
      });
      state.usingFallback = false;
      state.fallbackCurrent = 0;
      updateNowPlaying();
      syncFaders();
      syncLyrics();
      setStatus(song.tracks.length > 1 ? "Listo para mezclar pistas separadas." : "Listo para reproducir pista unica.");
    }

    function selectPlaylist(index) {
      state.playlistIndex = index;
      state.songIndex = 0;
      renderPlaylists();
      updateHeader();
      renderSongs();
      loadSong();
    }

    function selectSong(index) {
      state.songIndex = index;
      renderSongs();
      loadSong();
    }

    async function playPlayback() {
      state.playing = true;
      setPlayIcon();

      try {
        state.usingFallback = false;
        const audios = activeAudios();
        const startAt = audios[0].currentTime;
        audios.forEach((audio) => {
          audio.currentTime = startAt;
        });
        await Promise.all(audios.map((audio) => audio.play()));
        setStatus(audios.length > 1 ? "Reproduciendo pistas separadas." : "Reproduciendo pista unica.");
      } catch (error) {
        startFallback();
      }
    }

    function pausePlayback() {
      state.playing = false;
      trackAudios().forEach((audio) => audio.pause());
      clearInterval(state.fallbackTimer);
      setPlayIcon();
    }

    function stopPlayback() {
      pausePlayback();
      trackAudios().forEach((audio) => {
        audio.currentTime = 0;
      });
      state.fallbackCurrent = 0;
      updateProgress(0, state.fallbackDuration);
    }

    function startFallback() {
      state.usingFallback = true;
      clearInterval(state.fallbackTimer);
      setStatus("No se encontraron los MP3 de esta canción; el reproductor queda activo en modo muestra.", true);
      state.fallbackTimer = setInterval(() => {
        if (!state.playing) return;
        state.fallbackCurrent += 0.25;
        if (state.fallbackCurrent >= state.fallbackDuration) {
          if (state.loop) {
            state.fallbackCurrent = 0;
            updateProgress(0, state.fallbackDuration);
            return;
          }
          stopPlayback();
          return;
        }
        updateProgress(state.fallbackCurrent, state.fallbackDuration);
      }, 250);
    }

    function updateProgress(current, duration) {
      const total = duration || state.fallbackDuration || 1;
      els.progress.value = Math.round((current / total) * 1000);
      els.currentTime.textContent = formatTime(current);
      els.duration.textContent = formatTime(total);
    }

    function seekFromSlider() {
      const target = (Number(els.progress.value) / 1000) * state.fallbackDuration;
      state.fallbackCurrent = target;
      activeAudios().forEach((audio) => {
        audio.currentTime = target;
      });
      updateProgress(target, state.fallbackDuration);
    }

    function tickAudioProgress() {
      if (state.usingFallback) return;
      const audios = activeAudios();
      const duration = audios.find((audio) => Number.isFinite(audio.duration))?.duration || state.fallbackDuration;
      const current = audios[0]?.currentTime || 0;
      updateProgress(current, duration);
    }

    function updateLoadedDuration() {
      const audios = activeAudios();
      const duration = audios.find((audio) => Number.isFinite(audio.duration))?.duration;
      if (!duration) return;

      state.fallbackDuration = duration;
      currentSong().duration = formatTime(duration);
      updateProgress(audios[0]?.currentTime || 0, duration);
      renderSongs();
    }

    function handleTrackEnded() {
      if (!state.playing) return;

      const audios = activeAudios();
      const allEnded = audios.every((audio) => audio.ended || audio.currentTime >= (audio.duration || state.fallbackDuration) - 0.15);
      if (!allEnded) return;

      if (state.loop) {
        audios.forEach((audio) => {
          audio.currentTime = 0;
        });
        updateProgress(0, state.fallbackDuration);
        playPlayback();
        return;
      }

      stopPlayback();
    }

    els.playButton.addEventListener("click", () => {
      if (state.playing) {
        pausePlayback();
      } else {
        playPlayback();
      }
    });

    els.stopButton.addEventListener("click", stopPlayback);
    els.loopButton.addEventListener("click", () => {
      state.loop = !state.loop;
      syncLoopButton();
      setStatus(state.loop ? "Loop activado para la canción actual." : "Loop desactivado.");
    });
    els.progress.addEventListener("input", seekFromSlider);
    els.leadVolume.addEventListener("input", syncVolumes);
    els.choirVolume.addEventListener("input", syncVolumes);
    els.leadAudio.addEventListener("timeupdate", tickAudioProgress);
    els.choirAudio.addEventListener("timeupdate", tickAudioProgress);
    els.leadAudio.addEventListener("loadedmetadata", updateLoadedDuration);
    els.choirAudio.addEventListener("loadedmetadata", updateLoadedDuration);
    els.leadAudio.addEventListener("ended", handleTrackEnded);
    els.choirAudio.addEventListener("ended", handleTrackEnded);

    renderPlaylists();
    updateHeader();
    renderSongs();
    syncLoopButton();
    loadSong();
  </script>
</body>
</html>
